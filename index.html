<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markup Creator</title>
<script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0f1117; --surface:#1a1d27; --border:#2a2d3a;
    --accent:#00d4aa; --text:#e2e4ed; --muted:#666a80;
    --success:#00d4aa; --error:#ff4757; --warn:#ffa726;
  }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',sans-serif; font-size:13px; overflow:hidden; }
  .app { display:flex; flex-direction:column; height:100vh; padding:12px; gap:10px; }
  .header { display:flex; align-items:center; gap:8px; padding-bottom:10px; border-bottom:1px solid var(--border); }
  .header-icon { width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
  .header-icon svg { width:16px;height:16px;fill:var(--bg); }
  .header-title { font-size:13px;font-weight:500;letter-spacing:.02em; }
  .header-subtitle { font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace; }
  .status-dot { width:7px;height:7px;border-radius:50%;background:var(--muted);margin-left:auto;flex-shrink:0;transition:background .3s; }
  .status-dot.connected { background:var(--accent);box-shadow:0 0 6px var(--accent); }
  .status-dot.error { background:var(--error); }
  .section-label { font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px; }
  input { width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 10px;font-family:'IBM Plex Sans',sans-serif;font-size:12px;outline:none;transition:border-color .2s; }
  input:focus { border-color:var(--accent); }
  input::placeholder { color:var(--muted); }
  .btn { display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 12px;border-radius:6px;border:none;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap; }
  .btn svg { width:14px;height:14px;flex-shrink:0; }
  .btn-primary { background:var(--accent);color:var(--bg);width:100%; }
  .btn-primary:hover { background:#00efc0;transform:translateY(-1px); }
  .btn-primary:disabled { background:var(--border);color:var(--muted);cursor:not-allowed;transform:none; }
  .btn-secondary { background:var(--surface);color:var(--text);border:1px solid var(--border);flex:1; }
  .btn-secondary:hover { border-color:var(--accent);color:var(--accent); }
  .btn-danger { background:transparent;color:var(--error);border:1px solid var(--error);flex:1; }
  .btn-danger:hover { background:var(--error);color:white; }
  .selection-box { background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px; }
  .selection-count { font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:500;color:var(--accent);line-height:1;min-width:30px; }
  .selection-count.zero { color:var(--muted); }
  .selection-label { font-size:11px;color:var(--muted); }
  .selection-detail { font-size:11px;color:var(--text);margin-top:2px;font-family:'IBM Plex Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
  .log-box { flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow-y:auto;padding:8px;min-height:0; }
  .log-entry { display:flex;gap:6px;padding:3px 4px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:10px;line-height:1.4; }
  .log-time { color:var(--muted);flex-shrink:0; }
  .log-ok { color:var(--success); } .log-err { color:var(--error); } .log-info { color:var(--warn); }
  .log-msg { color:var(--text);word-break:break-all; }
  .empty-log { display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:6px;color:var(--muted); }
  .auto-row { display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px; }
  .toggle { position:relative;width:32px;height:18px;flex-shrink:0; }
  .toggle input { display:none; }
  .toggle-track { position:absolute;inset:0;background:var(--border);border-radius:9px;cursor:pointer;transition:background .2s; }
  .toggle input:checked + .toggle-track { background:var(--accent); }
  .toggle-thumb { position:absolute;top:2px;left:2px;width:14px;height:14px;background:white;border-radius:50%;transition:transform .2s;pointer-events:none; }
  .toggle input:checked ~ .toggle-thumb { transform:translateX(14px); }
  .auto-label { font-size:11px;color:var(--text);flex:1; }
  .auto-badge { font-size:9px;font-family:'IBM Plex Mono',monospace;background:var(--accent);color:var(--bg);padding:1px 5px;border-radius:3px;display:none;animation:pulse 1.5s infinite; }
  .auto-badge.active { display:block; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .spinner { width:12px;height:12px;border:2px solid transparent;border-top-color:var(--bg);border-radius:50%;animation:spin .6s linear infinite;display:none; }
  .loading .spinner { display:block; } .loading .btn-text { display:none; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .divider { height:1px;background:var(--border); }
  ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border);border-radius:2px; }
  .input-row { display:flex;gap:6px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon"><svg viewBox="0 0 24 24"><path d="M3 5h2V3H3v2zm0 8h2v-2H3v2zm0 8h2v-2H3v2zm4-4h14v-2H7v2zm0-8v2h14V9H7zm0-6v2h14V3H7z"/></svg></div>
    <div><div class="header-title">Text Markup Creator</div><div class="header-subtitle">Trimble Connect Extension</div></div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <div>
    <div class="section-label">Propriedade IFC</div>
    <input type="text" id="propName" value="Repère Assemblage/Elément béton" placeholder="Nome da propriedade IFC...">
  </div>

  <div>
    <div class="section-label">Seleção atual</div>
    <div class="selection-box">
      <div class="selection-count zero" id="selCount">0</div>
      <div>
        <div class="selection-label">objetos selecionados</div>
        <div class="selection-detail" id="selDetail">—</div>
      </div>
    </div>
  </div>

  <div class="auto-row">
    <label class="toggle"><input type="checkbox" id="autoToggle"><div class="toggle-track"></div><div class="toggle-thumb"></div></label>
    <span class="auto-label">Modo automático</span>
    <span class="auto-badge" id="autoBadge">ATIVO</span>
  </div>

  <button class="btn btn-primary" id="btnCreate" disabled>
    <span class="spinner"></span>
    <span class="btn-text">Criar Text Markups</span>
  </button>

  <div class="divider"></div>
  <div class="section-label">Log</div>
  <div class="log-box" id="logBox">
    <div class="empty-log" id="emptyLog"><span>Aguardando ações...</span></div>
  </div>

  <div class="input-row">
    <button class="btn btn-secondary" id="btnRefresh">↻ Atualizar</button>
    <button class="btn btn-danger" id="btnClear">✕ Limpar log</button>
  </div>
</div>

<script>
(async () => {
  let API = null;
  let selectedObjects = []; // array de { modelId, objectRuntimeId }
  let autoMode = false;
  let lastSelIds = '';

  const $ = id => document.getElementById(id);
  const statusDot = $('statusDot'), selCount = $('selCount'), selDetail = $('selDetail');
  const btnCreate = $('btnCreate'), logBox = $('logBox'), emptyLog = $('emptyLog');
  const autoToggle = $('autoToggle'), autoBadge = $('autoBadge');

  function log(msg, type='info') {
    emptyLog.style.display = 'none';
    const t = new Date().toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const e = document.createElement('div');
    e.className = 'log-entry';
    const sym = type==='ok'?'✓':type==='err'?'✗':'→';
    e.innerHTML = `<span class="log-time">${t}</span><span class="log-${type}">${sym}</span><span class="log-msg">${msg}</span>`;
    logBox.appendChild(e);
    logBox.scrollTop = logBox.scrollHeight;
  }

  function updateUI() {
    const n = selectedObjects.length;
    selCount.textContent = n;
    selCount.className = 'selection-count' + (n===0?' zero':'');
    btnCreate.disabled = n===0 || !API;
    selDetail.textContent = n===0 ? '—' : n===1 ? 'objeto selecionado' : `${n} objetos`;
  }

  // ── Ligar ────────────────────────────────────────────────────────
  log('A ligar...');
  try {
    API = await TrimbleConnectWorkspace.connect(window.parent, (event, data) => {
      if (event === 'viewer.modelObject.selection') {
        // data é array de { modelId, objectRuntimeId } ou { modelId, objectRuntimeIds }
        const raw = data || [];
        selectedObjects = [];
        for (const item of raw) {
          if (item.objectRuntimeIds) {
            for (const rid of item.objectRuntimeIds)
              selectedObjects.push({ modelId: item.modelId, objectRuntimeId: rid });
          } else if (item.objectRuntimeId != null) {
            selectedObjects.push({ modelId: item.modelId, objectRuntimeId: item.objectRuntimeId });
          }
        }
        updateUI();
        if (autoMode && selectedObjects.length > 0) {
          const ids = selectedObjects.map(o=>o.modelId+':'+o.objectRuntimeId).join(',');
          if (ids !== lastSelIds) { lastSelIds = ids; setTimeout(createMarkups, 400); }
        }
      }
    }, 15000);

    statusDot.classList.add('connected');
    log('Ligado!', 'ok');

    // Seleção inicial
    try {
      const sel = await API.viewer.getSelection();
      selectedObjects = [];
      for (const item of (sel||[])) {
        if (item.objectRuntimeIds) {
          for (const rid of item.objectRuntimeIds)
            selectedObjects.push({ modelId: item.modelId, objectRuntimeId: rid });
        } else if (item.objectRuntimeId != null) {
          selectedObjects.push({ modelId: item.modelId, objectRuntimeId: item.objectRuntimeId });
        }
      }
      updateUI();
      if (selectedObjects.length) log(`${selectedObjects.length} objeto(s) já selecionados.`, 'info');
    } catch(e) { log('Erro seleção inicial: '+e.message,'err'); }

  } catch(e) {
    statusDot.classList.add('error');
    log('Erro ao ligar: '+e.message,'err');
  }

  // ── Criar markups ────────────────────────────────────────────────
  async function createMarkups() {
    if (!API || selectedObjects.length===0) return;
    const propName = $('propName').value.trim() || 'Name';

    btnCreate.classList.add('loading');
    btnCreate.disabled = true;
    log(`Criando markups para ${selectedObjects.length} objeto(s) [prop: "${propName}"]...`);

    let ok=0, fail=0;

    for (const obj of selectedObjects) {
      try {
        const { modelId, objectRuntimeId } = obj;

        // 1. Obter propriedades do objeto
        let label = null;
        try {
          const props = await API.viewer.getObjectProperties(modelId, objectRuntimeId);
          // props é array de property sets: [{name, properties:[{name,value},...]}]
          if (props) {
            const propLower = propName.toLowerCase();
            for (const set of (Array.isArray(props) ? props : [props])) {
              for (const p of (set.properties||set.attributes||[])) {
                if ((p.name||'').toLowerCase() === propLower) {
                  label = p.value; break;
                }
              }
              if (label) break;
            }
          }
        } catch(e) { log('getObjectProperties erro: '+e.message,'err'); }

        if (!label) {
          log(`Prop "${propName}" não encontrada — usando ID`,'info');
          label = String(objectRuntimeId);
        }

        // 2. Obter posição do objeto para o markup
        let position = null;
        try {
          const pos = await API.viewer.getObjectPositions(modelId, [objectRuntimeId]);
          if (pos && pos[0]) position = pos[0];
        } catch(e) { /* posição é opcional */ }

        // 3. Criar text markup — API.markup.addTextMarkup
        const markupObj = { text: label };
        if (position) {
          markupObj.position = position;
        }

        await API.markup.addTextMarkup([markupObj]);

        log(`✓ "${label}"`, 'ok');
        ok++;

      } catch(e) {
        log(`✗ Erro: ${e.message}`, 'err');
        fail++;
      }
    }

    log(`Concluído: ${ok} OK, ${fail} falha(s).`, ok>0?'ok':'err');
    btnCreate.classList.remove('loading');
    updateUI();
  }

  // ── Eventos ──────────────────────────────────────────────────────
  btnCreate.addEventListener('click', createMarkups);

  $('btnRefresh').addEventListener('click', async () => {
    try {
      const sel = await API.viewer.getSelection();
      selectedObjects = [];
      for (const item of (sel||[])) {
        if (item.objectRuntimeIds) {
          for (const rid of item.objectRuntimeIds)
            selectedObjects.push({ modelId: item.modelId, objectRuntimeId: rid });
        } else if (item.objectRuntimeId != null) {
          selectedObjects.push({ modelId: item.modelId, objectRuntimeId: item.objectRuntimeId });
        }
      }
      updateUI();
      log(`Seleção: ${selectedObjects.length} objeto(s).`, 'ok');
    } catch(e) { log('Erro: '+e.message,'err'); }
  });

  $('btnClear').addEventListener('click', () => {
    logBox.innerHTML = '';
    emptyLog.style.display = 'flex';
    logBox.appendChild(emptyLog);
  });

  autoToggle.addEventListener('change', () => {
    autoMode = autoToggle.checked;
    autoBadge.classList.toggle('active', autoMode);
    log(autoMode ? 'Modo automático ON.' : 'Modo automático OFF.', 'info');
  });
})();
</script>
</body>
</html>
