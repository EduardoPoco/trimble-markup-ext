<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markup Creator</title>
<script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0f1117;--s:#1a1d27;--b:#2a2d3a;--a:#00d4aa;--t:#e2e4ed;--m:#666a80;--err:#ff4757;--warn:#ffa726}
  html,body{height:100%;background:var(--bg);color:var(--t);font-family:'IBM Plex Sans',sans-serif;font-size:13px;overflow:hidden}
  .app{display:flex;flex-direction:column;height:100vh;padding:12px;gap:10px}
  .hdr{display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:1px solid var(--b)}
  .hdr-ico{width:28px;height:28px;background:var(--a);border-radius:6px;display:flex;align-items:center;justify-content:center}
  .hdr-ico svg{width:16px;height:16px;fill:var(--bg)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--m);margin-left:auto;transition:background .3s}
  .dot.ok{background:var(--a);box-shadow:0 0 6px var(--a)}.dot.err{background:var(--err)}
  .lbl{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--m);margin-bottom:5px}
  input{width:100%;background:var(--s);border:1px solid var(--b);border-radius:6px;color:var(--t);padding:7px 10px;font-family:inherit;font-size:12px;outline:none}
  input:focus{border-color:var(--a)}input::placeholder{color:var(--m)}
  .sel-box{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px}
  .cnt{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:500;color:var(--a);min-width:30px}
  .cnt.z{color:var(--m)}.sl{font-size:11px;color:var(--m)}.sd{font-size:11px;color:var(--t);font-family:'IBM Plex Mono',monospace}
  .btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 12px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;transition:all .15s}
  .btn-p{background:var(--a);color:var(--bg);width:100%}.btn-p:hover{background:#00efc0;transform:translateY(-1px)}
  .btn-p:disabled{background:var(--b);color:var(--m);cursor:not-allowed;transform:none}
  .btn-s{background:var(--s);color:var(--t);border:1px solid var(--b);flex:1}.btn-s:hover{border-color:var(--a);color:var(--a)}
  .btn-d{background:transparent;color:var(--err);border:1px solid var(--err);flex:1}.btn-d:hover{background:var(--err);color:#fff}
  .log{flex:1;background:var(--s);border:1px solid var(--b);border-radius:8px;overflow-y:auto;padding:8px;min-height:0;font-family:'IBM Plex Mono',monospace;font-size:10px}
  .le{display:flex;gap:6px;padding:2px 4px;border-radius:3px;line-height:1.5}
  .lt{color:var(--m);flex-shrink:0}.lok{color:var(--a)}.lerr{color:var(--err)}.linf{color:var(--warn)}.lm{color:var(--t);word-break:break-all}
  .row{display:flex;gap:6px}
  .auto-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--s);border:1px solid var(--b);border-radius:6px}
  .tog{position:relative;width:32px;height:18px;flex-shrink:0}
  .tog input{display:none}.tog-t{position:absolute;inset:0;background:var(--b);border-radius:9px;cursor:pointer;transition:background .2s}
  .tog input:checked+.tog-t{background:var(--a)}.tog-th{position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none}
  .tog input:checked~.tog-th{transform:translateX(14px)}
  .badge{font-size:9px;background:var(--a);color:var(--bg);padding:1px 5px;border-radius:3px;display:none;animation:pulse 1.5s infinite}
  .badge.on{display:block}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  hr{border:none;border-top:1px solid var(--b)}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-ico"><svg viewBox="0 0 24 24"><path d="M3 5h2V3H3v2zm0 8h2v-2H3v2zm0 8h2v-2H3v2zm4-4h14v-2H7v2zm0-8v2h14V9H7zm0-6v2h14V3H7z"/></svg></div>
    <div><div style="font-weight:500;font-size:13px">Text Markup Creator</div><div style="font-size:10px;color:var(--m);font-family:'IBM Plex Mono',monospace">Trimble Connect Extension</div></div>
    <div class="dot" id="dot"></div>
  </div>

  <div><div class="lbl">Propriedade IFC</div>
    <input id="prop" value="Repère Assemblage/Elément béton" placeholder="Nome da propriedade...">
  </div>

  <div><div class="lbl">Seleção atual</div>
    <div class="sel-box">
      <div class="cnt z" id="cnt">0</div>
      <div><div class="sl">objetos selecionados</div><div class="sd" id="sd">—</div></div>
    </div>
  </div>

  <div class="auto-row">
    <label class="tog"><input type="checkbox" id="auto"><div class="tog-t"></div><div class="tog-th"></div></label>
    <span style="font-size:11px;flex:1">Modo automático</span>
    <span class="badge" id="badge">ATIVO</span>
  </div>

  <button class="btn btn-p" id="btnC" disabled>Criar Text Markups</button>
  <hr>
  <div class="lbl">Log</div>
  <div class="log" id="log"><div style="color:var(--m);padding:8px">Aguardando ações...</div></div>
  <div class="row">
    <button class="btn btn-s" id="btnR">↻ Atualizar</button>
    <button class="btn btn-d" id="btnCl">✕ Limpar</button>
  </div>
</div>
<script>
(async()=>{
  let API=null, sel=[], autoOn=false, lastIds='';
  const $=id=>document.getElementById(id);
  const dot=$('dot'),cnt=$('cnt'),sd=$('sd'),btnC=$('btnC'),log=$('log');

  function addLog(msg,type='i'){
    const first=log.querySelector('div[style]');
    if(first&&first.style.color)first.remove();
    const t=new Date().toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const sym=type==='ok'?'✓':type==='e'?'✗':'→';
    const cls=type==='ok'?'lok':type==='e'?'lerr':'linf';
    const d=document.createElement('div');
    d.className='le';
    d.innerHTML=`<span class="lt">${t}</span><span class="${cls}">${sym}</span><span class="lm">${msg}</span>`;
    log.appendChild(d);
    log.scrollTop=log.scrollHeight;
  }

  function updUI(){
    const n=sel.length;
    cnt.textContent=n; cnt.className='cnt'+(n===0?' z':'');
    btnC.disabled=n===0||!API;
    sd.textContent=n===0?'—':n===1?'1 objeto':`${n} objetos`;
  }

  function parseSel(data){
    const out=[];
    for(const item of(data||[])){
      const ids=item.objectRuntimeIds||( item.objectRuntimeId!=null?[item.objectRuntimeId]:[] );
      for(const rid of ids) out.push({modelId:item.modelId,rid});
    }
    return out;
  }

  // ── Ligar ──────────────────────────────────────────────────────
  addLog('A ligar ao Trimble Connect...');
  try{
    API=await TrimbleConnectWorkspace.connect(window.parent,(ev,data)=>{
      if(ev==='viewer.modelObject.selection'){
        sel=parseSel(data);
        updUI();
        if(autoOn&&sel.length>0){
          const ids=sel.map(o=>o.modelId+':'+o.rid).join(',');
          if(ids!==lastIds){lastIds=ids;setTimeout(doCreate,400);}
        }
      }
    },15000);

    dot.classList.add('ok');
    addLog('Ligado!','ok');

    // Debug: mostrar chaves disponíveis na API
    addLog('API keys: '+Object.keys(API).join(', '));

    // Seleção inicial
    try{
      const s=await API.viewer.getSelection();
      sel=parseSel(s);
      updUI();
      if(sel.length) addLog(`${sel.length} objeto(s) já selecionados.`);
    }catch(e){addLog('Erro seleção inicial: '+e.message,'e');}

  }catch(e){
    dot.classList.add('err');
    addLog('Erro ao ligar: '+e.message,'e');
  }

  // ── Criar markups ──────────────────────────────────────────────
  async function doCreate(){
    if(!API||sel.length===0)return;
    const propName=$('prop').value.trim()||'Name';
    btnC.disabled=true;
    addLog(`Criando ${sel.length} markup(s) [prop: "${propName}"]...`);

    // Debug: ver estrutura do primeiro objeto selecionado
    if(sel[0]){
      addLog(`Objeto: modelId=${sel[0].modelId} rid=${sel[0].rid}`);
    }

    // Verificar se markup está disponível
    addLog('API.markup: '+(API.markup ? 'OK ('+Object.keys(API.markup).join(',')+')' : 'UNDEFINED'));

    let ok=0,fail=0;
    for(const obj of sel){
      try{
        const {modelId,rid}=obj;
        let label=null;

        // Obter propriedades
        try{
          const props=await API.viewer.getObjectProperties(modelId,rid);
          addLog('Props tipo: '+JSON.stringify(props).substring(0,120));
          const plow=propName.toLowerCase();
          // props pode ser array de {name, properties:[{name,value}]}
          const sets=Array.isArray(props)?props:[props];
          for(const set of sets){
            for(const p of(set?.properties||set?.attributes||[])){
              if((p?.name||'').toLowerCase()===plow){label=p.value||p.displayValue;break;}
            }
            if(label)break;
          }
        }catch(e){addLog('getObjectProperties erro: '+e.message,'e');}

        if(!label){
          addLog(`Prop não encontrada — usando ID ${rid}`,'i');
          label='ID:'+rid;
        }

        // Criar markup
        if(!API.markup){
          addLog('API.markup não disponível — a tentar API.viewer.markup...','i');
          // Tenta via viewer
          if(API.viewer?.markup){
            await API.viewer.markup.addTextMarkup([{text:label}]);
          } else {
            throw new Error('markup API não encontrada');
          }
        } else {
          await API.markup.addTextMarkup([{text:label}]);
        }

        addLog(`✓ "${label}"','ok');
        ok++;
      }catch(e){
        addLog(`✗ ${e.message}`,'e');
        fail++;
      }
    }
    addLog(`Concluído: ${ok} OK, ${fail} falha(s).`,ok>0?'ok':'e');
    updUI();
  }

  $('btnC').addEventListener('click',doCreate);
  $('btnR').addEventListener('click',async()=>{
    try{
      const s=await API.viewer.getSelection();
      sel=parseSel(s); updUI();
      addLog(`Seleção: ${sel.length} objeto(s).`,'ok');
    }catch(e){addLog('Erro: '+e.message,'e');}
  });
  $('btnCl').addEventListener('click',()=>{ log.innerHTML=''; });
  $('auto').addEventListener('change',e=>{
    autoOn=e.target.checked;
    $('badge').classList.toggle('on',autoOn);
    addLog(autoOn?'Auto ON.':'Auto OFF.');
  });
})();
</script>
</body>
</html>
